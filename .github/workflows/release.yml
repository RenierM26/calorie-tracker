name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: Semver version to release, for example 2.0.1
        required: true
        type: string

permissions:
  contents: write
  packages: write

jobs:
  release:
    name: Tag release and publish image
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Validate version
        id: version
        shell: bash
        run: |
          version='${{ inputs.version }}'
          if [[ ! "$version" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Version must look like 2.0.1" >&2
            exit 1
          fi
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "major_minor=${version%.*}" >> "$GITHUB_OUTPUT"
          echo "tag=v$version" >> "$GITHUB_OUTPUT"

      - name: Create annotated tag
        shell: bash
        run: |
          tag='${{ steps.version.outputs.tag }}'
          if git rev-parse "$tag" >/dev/null 2>&1; then
            echo "Tag $tag already exists; reusing it for image publish"
            exit 0
          fi
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git tag -a "$tag" -m "Release $tag"
          git push origin "$tag"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=raw,value=${{ steps.version.outputs.version }}
            type=raw,value=${{ steps.version.outputs.major_minor }}
            type=raw,value=${{ steps.version.outputs.tag }}
            type=sha,prefix=sha-
          labels: |
            org.opencontainers.image.title=Calorie Tracker
            org.opencontainers.image.description=Shared calorie and weight tracker with Express, SQLite, and an assistant-friendly API
            org.opencontainers.image.vendor=RenierM26
            org.opencontainers.image.version=${{ steps.version.outputs.version }}

      - name: Build and publish release image
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          provenance: false
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          tag='${{ steps.version.outputs.tag }}'
          version='${{ steps.version.outputs.version }}'
          major_minor='${{ steps.version.outputs.major_minor }}'
          short_sha="${GITHUB_SHA::7}"

          cat > release-notes.md <<EOF
          Release $tag

          Container images:
          - ghcr.io/${{ github.repository }}:$tag
          - ghcr.io/${{ github.repository }}:$version
          - ghcr.io/${{ github.repository }}:$major_minor
          - ghcr.io/${{ github.repository }}:sha-$short_sha
          EOF

          if gh release view "$tag" >/dev/null 2>&1; then
            gh release edit "$tag" \
              --title "$tag" \
              --notes-file release-notes.md
          else
            gh release create "$tag" \
              --title "$tag" \
              --notes-file release-notes.md
          fi
