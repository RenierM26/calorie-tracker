name: Container cleanup

on:
  schedule:
    - cron: '30 4 * * 0'
  workflow_dispatch:
    inputs:
      min_versions_to_keep:
        description: Number of recent GHCR image versions to keep
        required: false
        default: '20'
      delete_untagged:
        description: Delete untagged GHCR image versions
        required: false
        default: 'true'
        type: choice
        options:
          - 'true'
          - 'false'

permissions:
  contents: read
  packages: write

jobs:
  cleanup:
    name: Delete old GHCR image versions
    runs-on: ubuntu-latest
    steps:
      - name: Delete old tagged image versions
        uses: actions/delete-package-versions@v5
        with:
          package-name: calorie-tracker
          package-type: container
          min-versions-to-keep: ${{ inputs.min_versions_to_keep || '20' }}
          ignore-versions: '^(latest|main|v\d+\.\d+\.\d+|\d+\.\d+)$'
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Delete untagged image versions
        if: ${{ (inputs.delete_untagged || 'true') == 'true' }}
        uses: actions/delete-package-versions@v5
        with:
          package-name: calorie-tracker
          package-type: container
          delete-only-untagged-versions: 'true'
          min-versions-to-keep: '0'
          token: ${{ secrets.GITHUB_TOKEN }}
